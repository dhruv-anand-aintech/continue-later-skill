# Example continuation configuration for a Django web app
# Copy and adapt this for your project

projectName: Django Blog Platform
workingDirectory: /Users/dev/projects/blog-platform
projectDescription: |
  A multi-tenant Django blog platform with real-time collaboration features.
  Users can create blogs, write posts, and collaborate with other writers in real-time.
  Built on Django 4.2, PostgreSQL, Redis, and WebSockets via Django Channels.

techStack:
  - Python 3.11
  - Django 4.2 with Django REST Framework
  - PostgreSQL 15 with pgvector for semantic search
  - Redis for caching and message queues
  - Django Channels for WebSocket real-time features
  - React 18 (frontend)
  - Docker + Docker Compose (development)
  - Pytest for testing

currentState:
  working:
    - User authentication and permissions (OAuth2 + JWT)
    - Blog creation and multi-author management
    - Post CRUD operations with rich text editor
    - Basic semantic search on post content
    - Real-time presence indicators
    - Email notifications for mentions
  broken:
    - WebSocket disconnects after 10 minutes idle (needs keepalive ping)
    - Search results ranking inconsistent (embedding model version mismatch)
    - File upload fails on files >10MB (S3 multipart upload not implemented)
  inProgress:
    - Implementing collaborative editing (CRDT-based)
    - Migration to async Django views for performance
    - Setting up monitoring and alerting

recentChanges: |
  ### Fixed WebSocket Keepalive Issue
  Real-time collaboration was disconnecting after 10 minutes of inactivity.
  Added heartbeat mechanism: client sends ping every 5 minutes, server responds with pong.
  This prevents NAT timeout issues. Tested on both dev and staging environments.

  ### Fixed Search Ranking Inconsistency
  Post-search results were ranking inconsistently because embeddings were
  generated with two different model versions (BAAI/bge-m3 v1 vs v2).
  Updated all old embeddings with new model and set `embedding_model_version`
  field to prevent this regression. Created migration that backfilled the data
  and took ~2 hours on prod (547k posts). Added monitoring for embedding mismatches.

pendingTasks:
  - Implement CRDT-based collaborative editing (review Yjs vs Automerge)
  - Convert 10 high-traffic views to async Django (measure impact on response times)
  - Set up alerting for WebSocket disconnects (Datadog + PagerDuty integration)
  - Benchmark new async views before rolling out to 50% of traffic
  - Security audit of API endpoints (focus on rate limiting and data exposure)

keyDecisions:
  - Chose CRDT (conflict-free replicated data type) over OT (operational transform) for editing because it scales to many simultaneous editors without a central authority
  - Using pgvector for semantic search instead of Elasticsearch to reduce infrastructure complexity (one fewer service to manage)
  - Implemented rate limiting at the DRF view level instead of nginx to allow per-user customization

gotchas:
  - title: WebSocket NAT Timeout
    description: Idle WebSocket connections drop after exactly 10 minutes (NAT timeout, not a Django issue)
    solution: Implement heartbeat/keepalive pings every 5 minutes from client → server
    lesson: Always add keepalive to long-lived connections; timeouts are often environmental

  - title: PostgreSQL ENUM Types Can't Be Altered
    description: Tried to add a new value to status enum and got "ERROR: cannot add enum value"
    solution: Create new type, update columns, drop old type (downtime required or use trigger-based approach)
    lesson: Avoid ENUM types unless values are truly immutable; use string fields with constraints instead

  - title: Django Channels Testing Requires Special Setup
    description: Unit tests for WebSocket consumers need AsyncTestCase, not TestCase
    solution: Use `AsyncTestCase` from `django.test`, not unittest; use `await communicator.get_output()` not `communicator.receive()`
    lesson: Document async testing patterns early; finding this cost a day of CI failures

buildInstructions: |
  ```bash
  # 1. Prerequisites
  docker-compose up -d postgres redis
  python -m venv venv && source venv/bin/activate
  pip install -r requirements.txt

  # 2. Set up environment
  cp .env.example .env
  # Edit .env with your local database credentials

  # 3. Database setup
  python manage.py migrate
  python manage.py createsuperuser  # create admin account

  # 4. Run development server
  python manage.py runserver
  # Frontend: npm run dev (in frontend/ directory)

  # 5. Run tests
  pytest                    # all tests
  pytest -k test_websocket # specific tests
  ```

deployInstructions: |
  ```bash
  # Staging
  git checkout staging
  docker build -t blog-platform:staging .
  docker-compose -f docker-compose.staging.yml up -d

  # Production (requires approval from 2 team leads)
  git checkout main
  git tag release/2.3.0
  git push origin main --tags
  # GitHub Actions will build, test, and deploy to prod automatically
  ```
